<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hiring Pipeline — Track Every Candidate</title>
  <meta name="description" content="A single-screen hiring pipeline tracker. See every candidate's stage, status, and history at a glance.">
  <link rel="stylesheet" href="style.css?v=5">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
</head>
<body>

  <!-- ========== RED TOP BAR ========== -->
  <div class="cc-topbar"></div>

  <!-- ========== PRIMARY NAVBAR ========== -->
  <nav class="cc-navbar" id="cc-navbar">
    <div class="cc-navbar-left">
      <div class="cc-mark">
        <svg viewBox="0 0 16 16" fill="none" width="16" height="16">
          <rect x="2" y="2" width="5" height="12" fill="white" rx="1"/>
          <rect x="9" y="2" width="5" height="5" fill="white" rx="1"/>
          <rect x="9" y="9" width="5" height="5" fill="white" rx="1"/>
        </svg>
      </div>
      <div class="cc-brand-text">
        <span class="cc-brand-top">Computacenter</span>
        <span class="cc-brand-bottom">Agree<span class="cc-ya">Ya</span></span>
      </div>
      <div class="cc-divider"></div>
      <span class="cc-app-name">Hiring Pipeline</span>
    </div>
    <div class="cc-navbar-right">
      <span class="cc-internal-label">Internal tool</span>
    </div>
  </nav>

  <!-- ========== MAIN APP (hidden until authenticated) ========== -->
  <div id="app">

    <!-- Toolbar -->
    <div class="app-toolbar">
      <div class="app-toolbar-left">
        <span class="toolbar-greeting" id="user-greeting">Track every candidate from screen to offer</span>
      </div>
      <div class="app-toolbar-right">
        <button class="btn btn-secondary btn-sm" id="btn-activity" title="Activity Log">
          📋 Activity Log
        </button>
        <button class="btn btn-secondary btn-sm" id="btn-export" title="Export filtered data to CSV">
          📥 Export CSV
        </button>
        <button class="btn btn-primary btn-sm" id="btn-add">
          ＋ Add Candidate
        </button>
      </div>
    </div>

    <!-- Dashboard Strip -->
    <section class="dashboard-strip" id="dashboard-strip">
      <!-- Cards injected by JS -->
    </section>

    <!-- Filter Bar -->
    <section class="filter-bar" id="filter-bar">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="filter-search" placeholder="Search name, role, or client…">
      </div>
      <select id="filter-client"><option value="">All Clients</option></select>
      <select id="filter-stage"><option value="">All Stages</option></select>
      <select id="filter-status">
        <option value="">All Statuses</option>
        <option value="Pending">Pending</option>
        <option value="Cleared">Cleared</option>
        <option value="Rejected">Rejected</option>
      </select>
      <span class="active-filters-count" id="active-filters-count"></span>
      <button class="btn btn-ghost btn-sm" id="btn-clear-filters">Clear Filters</button>
    </section>

    <!-- Table -->
    <section class="table-wrapper" id="table-wrapper">
      <table class="pipeline-table" id="pipeline-table">
        <thead>
          <tr>
            <th>Full Name</th>
            <th>Location</th>
            <th>Role</th>
            <th>Client</th>
            <th>Current Stage</th>
            <th>Status</th>
            <th>Screened By</th>
            <th>Interviewed By</th>
            <th>Date</th>
            <th>Notes</th>
            <th style="width:60px;"></th>
          </tr>
        </thead>
        <tbody id="table-body">
          <!-- Rows injected by JS -->
        </tbody>
      </table>
    </section>

    <!-- Pagination -->
    <div class="pagination" id="pagination">
      <button class="btn btn-secondary btn-sm" id="btn-prev">← Prev</button>
      <span class="page-info" id="page-info"></span>
      <button class="btn btn-secondary btn-sm" id="btn-next">Next →</button>
    </div>

    <!-- Activity Log Section (hidden by default) -->
    <section class="activity-log-section" id="activity-log-section" style="display:none;">
      <div class="activity-log-header">
        <h2>📋 Activity Log</h2>
        <button class="btn btn-ghost btn-sm" id="btn-close-activity">✕ Close</button>
      </div>
      <div class="activity-log-body" id="activity-log-body">
        <!-- Rows injected by JS -->
      </div>
    </section>

  </div>

  <!-- ========== PANEL OVERLAY ========== -->
  <div class="panel-overlay" id="panel-overlay"></div>

  <!-- ========== SLIDE-IN PANEL ========== -->
  <aside class="slide-panel" id="slide-panel">
    <div class="panel-header">
      <h2 id="panel-title">Add Candidate</h2>
      <button class="btn-icon" id="panel-close">✕</button>
    </div>
    <div class="panel-body" id="panel-body">
      <!-- Content injected by JS -->
    </div>
    <div class="panel-footer" id="panel-footer">
      <button class="btn btn-secondary" id="panel-cancel">Cancel</button>
      <button class="btn btn-primary" id="panel-save">Save</button>
    </div>
  </aside>

  <!-- ========== CONFIRM DIALOG ========== -->
  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-dialog">
      <h3 id="confirm-title">Are you sure?</h3>
      <p id="confirm-message">This action cannot be undone.</p>
      <div class="confirm-actions">
        <button class="btn btn-secondary btn-sm" id="confirm-cancel">Cancel</button>
        <button class="btn btn-danger btn-sm" id="confirm-yes">Delete</button>
      </div>
    </div>
  </div>

  <!-- ========== TOAST CONTAINER (top-right) ========== -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js?v=5"></script>
</body>
</html>
